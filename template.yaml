AWSTemplateFormatVersion: '2010-09-09'

Description: TechMart Website Infrastructure

Resources:

  TechMartBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub techmart-${AWS::AccountId}-${AWS::Region}
      WebsiteConfiguration:
        IndexDocument: index.html

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TechMartBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action:
              - s3:GetObject
            Resource:
              - !Sub "${TechMartBucket.Arn}/*"

Outputs:

  BucketName:
    Value: !Ref TechMartBucket

  WebsiteURL:
    Value: !GetAtt TechMartBucket.WebsiteURL