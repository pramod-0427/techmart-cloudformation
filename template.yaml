AWSTemplateFormatVersion: '2010-09-09'

Description: TechMart Website Infrastructure

Resources:

  TechMartBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub techmart-${AWS::AccountId}-${AWS::Region}
      VersioningConfiguration:
        Status: Enabled
      WebsiteConfiguration:
        IndexDocument: index.html

Outputs:

  BucketName:
    Value: !Ref TechMartBucket

  WebsiteURL:
    Value: !GetAtt TechMartBucket.WebsiteURL